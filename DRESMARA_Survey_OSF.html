<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRESMARA — AI-Assisted Decision-Making Study</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<!-- EmailJS SDK — sends participant data directly to caesarvasilescu@gmail.com -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* ── Design system ─────────────────────────────────────────────────────── */
:root {
  --navy:      #1C2B4A;
  --navy-mid:  #2E4470;
  --navy-lt:   #3D5A99;
  --gold:      #C8952A;
  --gold-lt:   #E8B94A;
  --cream:     #F8F5EE;
  --cream-dark:#EDE8DC;
  --text:      #1A1A2E;
  --text-mid:  #3D3D5C;
  --text-lt:   #6B7094;
  --border:    #C8C0B0;
  --border-lt: #E0D8CC;
  --scaff:     #D6E8F7;
  --scaff-dk:  #1A4A7A;
  --ctrl:      #FDE9D9;
  --ctrl-dk:   #7A2A00;
  --success:   #2D6A4F;
  --warn:      #9B6A00;
  --radius:    6px;
  --shadow:    0 2px 12px rgba(28,43,74,.10);
  --shadow-lg: 0 8px 40px rgba(28,43,74,.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.65;
}

/* ── Header bar ─────────────────────────────────────────────────────────── */
.site-header {
  background: var(--navy);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.25);
}
.site-header .logo {
  font-family: 'Libre Baskerville', serif;
  color: #fff;
  font-size: 1.05rem;
  letter-spacing: .03em;
}
.site-header .logo span { color: var(--gold-lt); }
.progress-bar-wrap {
  flex: 1; max-width: 320px; margin: 0 32px;
  background: rgba(255,255,255,.15);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-lt));
  border-radius: 99px;
  transition: width .5s ease;
  width: 0%;
}
.progress-label {
  color: rgba(255,255,255,.7);
  font-size: .78rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── Main container ─────────────────────────────────────────────────────── */
.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ── Screens ────────────────────────────────────────────────────────────── */
.screen { display: none; animation: fadeIn .35s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* ── Cards ──────────────────────────────────────────────────────────────── */
.card {
  background: #fff;
  border: 1px solid var(--border-lt);
  border-radius: 10px;
  padding: 36px 40px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}
.card-title {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.35rem;
  color: var(--navy);
  margin-bottom: 6px;
  line-height: 1.35;
}
.card-subtitle {
  font-size: .88rem;
  color: var(--text-lt);
  margin-bottom: 20px;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.card hr { border: none; border-top: 1px solid var(--border-lt); margin: 20px 0; }

/* ── Section label ──────────────────────────────────────────────────────── */
.section-label {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.7rem;
  color: var(--navy);
  margin-bottom: 4px;
}
.section-meta {
  color: var(--text-lt);
  font-size: .9rem;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--border-lt);
}

/* ── Vignette text ──────────────────────────────────────────────────────── */
.vignette-box {
  background: var(--cream);
  border-left: 4px solid var(--navy-lt);
  border-radius: 0 6px 6px 0;
  padding: 20px 24px;
  margin: 16px 0 24px;
  font-size: .95rem;
  line-height: 1.75;
  color: var(--text-mid);
}
.vignette-box .vignette-inner-quote {
  margin: 12px 0;
  padding: 12px 18px;
  background: rgba(255,255,255,.7);
  border-left: 3px solid var(--gold);
  font-style: italic;
  color: var(--text);
  border-radius: 0 4px 4px 0;
}
.vignette-box ul, .vignette-box ol {
  padding-left: 20px;
  margin: 8px 0;
}
.vignette-box li { margin-bottom: 6px; }
.vignette-box strong { color: var(--navy); }
.task-instruction {
  background: var(--navy);
  color: #fff;
  padding: 14px 20px;
  border-radius: var(--radius);
  font-size: .93rem;
  margin-bottom: 24px;
  line-height: 1.55;
}
.task-instruction strong { color: var(--gold-lt); }

/* ── Condition badge ────────────────────────────────────────────────────── */
.cond-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 99px;
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.cond-badge.scaffolded { background: var(--scaff); color: var(--scaff-dk); }
.cond-badge.unstructured { background: var(--ctrl); color: var(--ctrl-dk); }
.cond-badge::before { content:''; width:8px; height:8px; border-radius:50%; background:currentColor; }

/* ── Prompt template ────────────────────────────────────────────────────── */
.prompt-template { border: 1px solid var(--border); border-radius: 8px; overflow:hidden; margin-bottom: 24px; }
.prompt-template-header {
  background: var(--navy);
  color: #fff;
  padding: 12px 20px;
  font-family: 'Libre Baskerville', serif;
  font-size: .95rem;
}
.prompt-template-header span { color: var(--gold-lt); font-size:.8rem; margin-left:8px; }
.prompt-field {
  display: grid;
  grid-template-columns: 160px 1fr;
  border-bottom: 1px solid var(--border-lt);
}
.prompt-field:last-child { border-bottom: none; }
.prompt-field-label {
  background: var(--navy-mid);
  color: #fff;
  padding: 14px 16px;
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.prompt-field-label .hint {
  font-size: .72rem;
  color: rgba(255,255,255,.6);
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
}
.prompt-field textarea {
  border: none;
  outline: none;
  resize: vertical;
  padding: 14px 16px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: .92rem;
  line-height: 1.6;
  background: #fff;
  color: var(--text);
  min-height: 72px;
  width: 100%;
  transition: background .2s;
}
.prompt-field textarea:focus { background: #F0F6FF; }

/* Free-form (control) */
.free-prompt textarea {
  width: 100%;
  min-height: 130px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: .92rem;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color .2s, background .2s;
}
.free-prompt textarea:focus { border-color: var(--navy-lt); background: #F0F6FF; }

/* ── ChatGPT link area ──────────────────────────────────────────────────── */
.chatgpt-link-area {
  background: #F0F6F0;
  border: 1px solid #A8D4B0;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: .9rem;
}
.chatgpt-link-area label { font-weight: 600; color: var(--success); display: block; margin-bottom: 6px; }
.chatgpt-link-area input[type=url] {
  width: 100%; padding: 9px 12px;
  border: 1px solid #A8D4B0;
  border-radius: 4px;
  font-family: 'Source Code Pro', monospace;
  font-size: .82rem;
  outline: none;
}
.chatgpt-link-area input[type=url]:focus { border-color: var(--success); }
.chatgpt-link-area .hint-text {
  font-size: .78rem; color: #4A8A5A; margin-top: 6px;
}

/* ── Likert scale ───────────────────────────────────────────────────────── */
.likert-block { margin-bottom: 20px; }
.likert-q {
  font-size: .95rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 10px;
}
.likert-q .sub { font-weight: 400; color: var(--text-lt); font-size:.82rem; margin-left:6px; }
.likert-scale {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.likert-scale label {
  flex: 1;
  text-align: center;
  cursor: pointer;
  padding: 10px 4px 8px;
  border-right: 1px solid var(--border-lt);
  transition: background .15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: .8rem;
  color: var(--text-lt);
  user-select: none;
}
.likert-scale label:last-child { border-right: none; }
.likert-scale label:hover { background: var(--cream); }
.likert-scale input[type=radio] { display: none; }
.likert-scale input[type=radio]:checked + span + span,
.likert-scale label:has(input[type=radio]:checked) {
  background: var(--navy);
  color: #fff;
}
.likert-scale label:has(input[type=radio]:checked) {
  background: var(--navy);
  color: #fff;
}
.likert-num { font-size: 1rem; font-weight: 700; }
.likert-anchor { font-size: .7rem; color: inherit; }
.likert-anchors {
  display: flex;
  justify-content: space-between;
  font-size: .72rem;
  color: var(--text-lt);
  padding: 4px 2px 0;
}

/* ── Usage indicator ────────────────────────────────────────────────────── */
.usage-options {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.usage-option {
  flex: 1;
  min-width: 140px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  cursor: pointer;
  text-align: center;
  font-size: .88rem;
  font-weight: 500;
  color: var(--text-mid);
  transition: all .2s;
  user-select: none;
}
.usage-option:hover { border-color: var(--navy-lt); color: var(--navy); }
.usage-option.selected { border-color: var(--navy); background: var(--navy); color: #fff; }
.usage-option input { display: none; }

/* ── NASA-TLX ───────────────────────────────────────────────────────────── */
.tlx-grid { display: grid; gap: 16px; }
.tlx-item label {
  display: block;
  font-size: .9rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
}
.tlx-item .tlx-desc {
  font-size: .78rem;
  color: var(--text-lt);
  margin-bottom: 8px;
}
.tlx-item input[type=range] {
  width: 100%;
  accent-color: var(--navy-lt);
  height: 6px;
}
.tlx-scale-labels {
  display: flex;
  justify-content: space-between;
  font-size: .72rem;
  color: var(--text-lt);
  margin-top: 4px;
}
.tlx-val {
  display: inline-block;
  background: var(--navy);
  color: #fff;
  font-size: .75rem;
  padding: 2px 8px;
  border-radius: 99px;
  margin-left: 8px;
  font-family: 'Source Code Pro', monospace;
  vertical-align: middle;
}

/* ── Demographic fields ─────────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: .85rem;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: .02em;
}
.form-group select,
.form-group input[type=number],
.form-group input[type=text],
.form-group input[type=email] {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Source Sans 3', sans-serif;
  font-size: .92rem;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
  background: #fff;
}
.form-group select:focus,
.form-group input:focus { border-color: var(--navy-lt); }
.form-group .hint { font-size: .75rem; color: var(--text-lt); }

/* ── SUS ────────────────────────────────────────────────────────────────── */
.sus-grid { display: grid; gap: 14px; }
.sus-item { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
.sus-item .sus-q { font-size: .9rem; color: var(--text); }
.sus-item .sus-scale {
  display: flex;
  gap: 4px;
}
.sus-item .sus-scale label {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: .78rem; font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.sus-item .sus-scale label:hover { border-color: var(--navy-lt); }
.sus-item .sus-scale input { display: none; }
.sus-item .sus-scale label:has(input:checked) {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}
.sus-anchors { display: flex; justify-content: space-between; font-size: .7rem; color: var(--text-lt); margin-top: 2px; }

/* ── TiA ────────────────────────────────────────────────────────────────── */
.tia-grid { display: grid; gap: 14px; }

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border: none;
  border-radius: var(--radius);
  font-family: 'Source Sans 3', sans-serif;
  font-size: .95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
  text-decoration: none;
}
.btn-primary {
  background: var(--navy);
  color: #fff;
}
.btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(28,43,74,.25); }
.btn-secondary {
  background: var(--cream-dark);
  color: var(--navy);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border-lt); }
.btn-gold {
  background: var(--gold);
  color: #fff;
}
.btn-gold:hover { background: var(--gold-lt); color: var(--navy); }
.btn-group { display: flex; gap: 12px; margin-top: 28px; align-items: center; }
.btn-group.right { justify-content: flex-end; }

/* ── Timer ──────────────────────────────────────────────────────────────── */
.timer-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--navy);
  color: #fff;
  padding: 5px 12px;
  border-radius: 99px;
  font-family: 'Source Code Pro', monospace;
  font-size: .82rem;
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: opacity .4s;
}
.timer-badge.visible { opacity: 1; }
.timer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-lt); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

/* ── Consent checkboxes ─────────────────────────────────────────────────── */
.consent-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 16px;
  background: var(--cream);
  border-radius: var(--radius);
  margin-bottom: 10px;
}
.consent-item input[type=checkbox] {
  width: 18px; height: 18px;
  accent-color: var(--navy);
  margin-top: 2px;
  flex-shrink: 0;
}
.consent-item label { font-size: .9rem; color: var(--text-mid); line-height: 1.55; cursor: pointer; }

/* ── Completion page ────────────────────────────────────────────────────── */
.completion-seal {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--navy), var(--navy-lt));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 2.2rem;
  box-shadow: 0 4px 24px rgba(28,43,74,.3);
}
.data-preview {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'Source Code Pro', monospace;
  font-size: .75rem;
  color: var(--text-mid);
  max-height: 280px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ── Info callout ───────────────────────────────────────────────────────── */
.callout {
  padding: 14px 18px;
  border-radius: var(--radius);
  font-size: .88rem;
  line-height: 1.6;
  margin-bottom: 16px;
}
.callout-info { background: #E8F0FB; border-left: 4px solid var(--navy-lt); color: var(--navy); }
.callout-warn { background: #FFF8E1; border-left: 4px solid var(--gold); color: #5A3E00; }
.callout-success { background: #E8F5EE; border-left: 4px solid var(--success); color: #1A4A2E; }

/* ── Video embed stub ───────────────────────────────────────────────────── */
.video-stub {
  background: var(--navy);
  border-radius: 8px;
  aspect-ratio: 16/9;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: rgba(255,255,255,.7);
  font-size: .9rem;
  margin: 16px 0;
}
.video-play {
  width: 56px; height: 56px;
  background: rgba(255,255,255,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  cursor: pointer;
  transition: background .2s;
}
.video-play:hover { background: rgba(255,255,255,.25); }

/* ── Required marker ────────────────────────────────────────────────────── */
.req { color: #B00; margin-left: 3px; }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  .card { padding: 24px 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .sus-item { grid-template-columns: 1fr; }
  .prompt-field { grid-template-columns: 1fr; }
  .prompt-field-label { padding: 10px 14px; }
  .site-header { padding: 0 16px; }
  .progress-bar-wrap { max-width: 120px; }
}
</style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="logo">DRESMARA <span>/ Study Portal</span></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">Consent</div>
</header>

<!-- ── Timer badge ───────────────────────────────────────────────────────── -->
<div class="timer-badge" id="timerBadge">
  <div class="timer-dot"></div>
  <span id="timerDisplay">00:00</span>
</div>

<div class="container" id="mainContainer"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const STATE = {
  condition: null,          // 'S' = scaffolded, 'C' = unstructured
  currentScreen: 0,
  vignette: 0,              // 1–4
  timerStart: null,
  timerInterval: null,
  timings: {},              // { V1: seconds, V2: seconds, … }
  data: {
    id: null,
    condition: null,
    // Demographics
    age: null, gender: null, education: null,
    rank: null, missions: null, ai_fam: null,
    email: null,
    // Per vignette: prompt, conv_url, rel, suf, tru, use, tlx, time
    V1:{}, V2:{}, V3:{}, V4:{},
    // SUS (10 items)
    sus: Array(10).fill(null),
    // TiA (7 items)
    tia: Array(7).fill(null),
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// CONTENT
// ─────────────────────────────────────────────────────────────────────────────
const VIGNETTES = {
  1: {
    title: "Vignette 1 — Report Drafting",
    tag: "SALUTE Report",
    frontier: "outside",
    text: `<p>You are a junior officer serving as the Intelligence Officer (S2) for a battalion-level task force deployed in a peacekeeping operation in Verdania. Your battalion is responsible for maintaining security in a semi-urban sector that has recently experienced an increase in armed group activity.</p>
    <p style="margin-top:10px">At 15:30 local time on 14 April 2025, a patrol from Charlie Company reported the following observation while conducting routine route clearance along Route AMBER:</p>
    <div class="vignette-inner-quote">"We observed a group of approximately 12 to 15 individuals dressed in civilian clothing. They were moving in a south-easterly direction along Route AMBER, approximately 200 metres north of the bridge at Grid 4471. The group included at least one civilian pickup truck with a mounted weapon on the flatbed. Several individuals were carrying AK-pattern rifles. The observation was made at approximately 14:30 local time."</div>`,
    task: `Using <strong>ChatGPT 4.5</strong>, draft a SALUTE report based on the patrol's observation above. Your report must cover all six elements: <strong>Size, Activity, Location, Unit, Time, Equipment</strong>. Paste or summarise your ChatGPT-assisted SALUTE report in the response box below.`,
    responseLabel: "Your SALUTE Report (ChatGPT-assisted)",
    responsePlaceholder: "S — Size:\nA — Activity:\nL — Location:\nU — Unit:\nT — Time:\nE — Equipment:",
    responseRows: 9,
  },
  2: {
    title: "Vignette 2 — Knowledge Summarisation",

// TIMER

function startTimer(vigKey) {
  STATE.timerStart = Date.now();
  STATE.timings[vigKey] = null;
  document.getElementById('timerBadge').classList.add('visible');
  clearInterval(STATE.timerInterval);
  STATE.timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - STATE.timerStart) / 1000);
    const m = Math.floor(s/60).toString().padStart(2,'0');
    const sec = (s%60).toString().padStart(2,'0');
    document.getElementById('timerDisplay').textContent = `${m}:${sec}`;
  }, 1000);
}
function stopTimer(vigKey) {
  if (!STATE.timerStart) return 0;
  clearInterval(STATE.timerInterval);
  const elapsed = Math.round((Date.now() - STATE.timerStart) / 1000);
  STATE.timings[vigKey] = elapsed;
  STATE.timerStart = null;
  document.getElementById('timerBadge').classList.remove('visible');
  return elapsed;
}

const LABELS = {
  consent:'Consent', tutorial:'Tutorial',
  v1_prompt:'Vignette 1', v1_measures:'Vignette 1',
  v2_prompt:'Vignette 2', v2_measures:'Vignette 2',
  v3_prompt:'Vignette 3', v3_measures:'Vignette 3',
  v4_prompt:'Vignette 4', v4_measures:'Vignette 4',
  sus:'Usability', tia:'Trust Scale', demographics:'Profile', complete:'Complete'
};
function updateProgress(screenId) {
  const idx = SCREENS.indexOf(screenId);
  const pct = Math.round((idx / (SCREENS.length-1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = LABELS[screenId] || '';
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────────────────────────────────────
function render(screenId) {
  updateProgress(screenId);
  const c = document.getElementById('mainContainer');
  c.innerHTML = '';
  const builders = {
    consent:      buildConsent,
    tutorial:     buildTutorial,
    v1_prompt:    () => buildVigPrompt(1),
    v1_measures:  () => buildVigMeasures(1),
    v2_prompt:    () => buildVigPrompt(2),
    v2_measures:  () => buildVigMeasures(2),
    v3_prompt:    () => buildVigPrompt(3),
    v3_measures:  () => buildVigMeasures(3),
    v4_prompt:    () => buildVigPrompt(4),
    v4_measures:  () => buildVigMeasures(4),
    sus:          buildSUS,
    tia:          buildTIA,
    demographics: buildDemographics,
    complete:     buildComplete,
  };
  if (builders[screenId]) builders[screenId]();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goTo(screenId) {
  STATE.currentScreen = SCREENS.indexOf(screenId);
  render(screenId);
}
function next() {
  const idx = STATE.currentScreen;
  if (idx < SCREENS.length - 1) {
    STATE.currentScreen++;
    render(SCREENS[STATE.currentScreen]);
  }
}

    if (el) el.classList.toggle('selected', i===idx);
  });
  STATE.data['V'+vNum].use = val;
}

function submitVigMeasures(vNum) {
  const vd = STATE.data['V'+vNum];
  if (!vd.rel || !vd.suf || !vd.tru) {
    alert('Please complete all three perception rating scales.'); return;
  }
  if (!vd.use) { alert('Please indicate how you used the ChatGPT response.'); return; }
  // Auto-compute TCI
  const meanPerc = (vd.rel + vd.suf + vd.tru) / 3 / 5;
  // Accuracy not known at this point — TCI will be computed offline; store perception mean
  vd.perc_mean = parseFloat(meanPerc.toFixed(4));
  if (vNum < 4) {
    goTo('v'+(vNum+1)+'_prompt');
  } else {
    goTo('sus');
  }
}

function submitSUS() {
  if (STATE.data.sus.some(v => v===null)) {
    alert('Please rate all 10 SUS items before continuing.'); return;
  }
  // Compute SUS score
  const score = STATE.data.sus.reduce((acc, v, i) => {
    return acc + (i%2===0 ? v-1 : 5-v);
  }, 0) * 2.5;
  STATE.data.sus_score = Math.round(score);
  goTo('tia');
}

const EMAILJS_CONFIG = {

// ─────────────────────────────────────────────────────────────────────────────
// SEND RESPONSE DATA
// Tries EmailJS first; falls back to mailto: if not configured or if it fails
// ─────────────────────────────────────────────────────────────────────────────
async function sendResponseData() {
  const json        = JSON.stringify(STATE.data, null, 2);
  const subject     = `DRESMARA Study — Response ${STATE.data.id} (${STATE.data.condition})`;
  const replyTo     = STATE.data.email || EMAILJS_CONFIG.recipient;

  // ── Status display ──────────────────────────────────────────────────────
  const statusEl = document.getElementById('sendStatus');
  function setStatus(type, html) {
    statusEl.className = 'callout callout-' + type;
    statusEl.style.display = 'block';
    statusEl.innerHTML = html;
  }

  // ── Try EmailJS if configured ────────────────────────────────────────────
  if (EMAILJS_CONFIG.configured) {
    setStatus('info', '<strong>Sending…</strong> Transmitting your data to the research team.');
    try {
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
        participant_id: STATE.data.id,
        condition:      STATE.data.condition,
        sus_score:      STATE.data.sus_score,
        tia_mean:       STATE.data.tia_mean,
        reply_to:       replyTo,
        recipient:      EMAILJS_CONFIG.recipient,
        message:        json,
      });
      setStatus('success',
        `<strong>✓ Data sent successfully</strong> to ${EMAILJS_CONFIG.recipient}.<br>
         Participant ID: <code style="font-size:.85rem">${STATE.data.id}</code> — no further action required.`);
      document.getElementById('fallbackSection').style.display = 'none';
      return;
    } catch(err) {
      setStatus('warn',
        `<strong>Automatic sending failed</strong> (${err.text || err.message || 'network error'}).<br>
         Please use one of the manual options below to submit your data.`);
    }
  } else {
    setStatus('warn',
      `<strong>Sending failed.</strong> Please use one of the manual submission options below to send your data to the research team.`);
  }

  // ── Fallback: mailto ─────────────────────────────────────────────────────
  document.getElementById('fallbackSection').style.display = 'block';
}

// DATA HELPERS

function sendViaMailto() {
  const json    = JSON.stringify(STATE.data, null, 2);
  const subject = encodeURIComponent(
    `DRESMARA Study — Response ${STATE.data.id} (${STATE.data.condition})`);
  const body    = encodeURIComponent(
    `Participant ID: ${STATE.data.id}\nCondition: ${STATE.data.condition}\n\n` +
    `Please do not edit this message. Full response data:\n\n${json}`);
  // mailto has a ~2000 character URL limit in some clients — we keep the
  // body lean and instruct them to attach the downloaded JSON if needed
  const shortBody = encodeURIComponent(
    `Participant ID: ${STATE.data.id}\nCondition: ${STATE.data.condition}\n` +
    `SUS: ${STATE.data.sus_score}  TiA: ${STATE.data.tia_mean}\n\n` +
    `Please attach the downloaded JSON file (DRESMARA_${STATE.data.id}_${STATE.data.condition}.json) to this email.`);
  window.location.href =
    `mailto:caesarvasilescu@gmail.com?subject=${subject}&body=${shortBody}`;
  // Also trigger download so they have the file to attach
  setTimeout(downloadData, 800);
}

function copyData() {
  const json = JSON.stringify(STATE.data, null, 2);
  navigator.clipboard.writeText(json)
    .then(() => alert('Data copied to clipboard. Paste it into an email to caesarvasilescu@gmail.com.'))
    .catch(() => alert('Copy failed — please select all text in the data box and copy manually.'));
}

function downloadData() {
  const blob = new Blob([JSON.stringify(STATE.data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `DRESMARA_${STATE.data.id}_${STATE.data.condition}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT — read condition from URL parameter
//
// Two links are distributed by the researcher:
//   Scaffolded:   https://[host]/DRESMARA_Survey.html?condition=S
//   Unstructured: https://[host]/DRESMARA_Survey.html?condition=C
//
// condition : S = Scaffolded, C = Unstructured (required)
//
// The anonymous participant ID (P_ID) is auto-generated at submission,
// not pre-assigned. No personalised links or recruitment lists are needed.
//
// If the condition parameter is missing or invalid, a blocking error screen
// is shown and the survey does not start.
// ─────────────────────────────────────────────────────────────────────────────
(function initFromURL() {
  const params    = new URLSearchParams(window.location.search);
  const condParam = (params.get('condition') || '').toUpperCase().trim();
  const validCond = condParam === 'S' || condParam === 'C';

  if (!validCond) {
    // Show blocking error — do not start survey
    document.getElementById('mainContainer').innerHTML = `
    <div class="card" style="text-align:center; margin-top:40px;">
      <div style="font-size:2.5rem;margin-bottom:16px;">⚠️</div>
      <div class="card-title" style="color:#B00020;margin-bottom:12px;">Invalid or Missing Survey Link</div>
      <div class="callout callout-warn" style="text-align:left;margin-bottom:20px;">
        <strong>This survey link is incomplete or has been modified.</strong><br><br>
        To participate, please use the exact link provided in your invitation
        email from the research team. The link encodes your pre-assigned study
        condition and must not be modified.
      </div>
      <div class="callout callout-info" style="text-align:left;">
        If you believe you have received this message in error, please contact
        the principal investigator:<br>
        <strong>Col. Prof. habil. eng. Cezar Vasilescu</strong><br>
        <a href="mailto:caesarvasilescu@gmail.com" style="color:var(--navy-lt)">
          caesarvasilescu@gmail.com
        </a>
      </div>
    </div>`;
    return;
  }

  // ── Condition valid — set in STATE; P_ID generated at consent submission ──
  STATE.condition      = condParam;
  STATE.data.condition = condParam === 'S' ? 'Scaffolded' : 'Unstructured';

  render('consent');
})();
